# Watchy manual position file (#4) — copy to ~/watchy_config/positions.yaml
#
# This is the FINAL fallback for position data. The live source is the Schwab
# API; on a successful fetch its data is cached to ~/watchy_config/positions_cache.json
# and served (flagged stale) if a later fetch fails. This file is used only when
# there's no live data and no cache yet — e.g. before Schwab is first authorised.
#
# Update it whenever your holdings change. Never commit it (it lives outside the
# repo, in ~/watchy_config/, alongside secrets.yaml).

# Optional: when these holdings were accurate. Used to label staleness in the
# advice (e.g. "manual file, as of 2026-06-05 ... (3d old)"). If omitted, the
# file's modification time is used instead. Accepts a date or ISO datetime.
# as_of: 2026-06-05

# Optional but RECOMMENDED: uninvested cash + cash-equivalents (money-market /
# sweep balances not listed as positions below). This is counted into your total
# account value so the advisor judges concentration against equities PLUS cash,
# not the stock-only total — without it, a normal holding can be flagged as a
# false over-concentration and wrongly advised to TRIM. (A money-market fund you
# hold as shares, e.g. SGOV, can instead be listed as a normal position below.)
# cash: 1700.0

positions:
  - ticker: NVDA
    quantity: 100
    average_cost: 120.50
  - ticker: AAPL
    quantity: 50
    average_cost: 190.00
    # current_price is optional — pin it to skip the live yfinance lookup
    # (otherwise market value & unrealized P&L are derived from a live price).
    # current_price: 195.00
