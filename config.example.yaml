# Watchy Configuration (example template)
# Copy to ~/watchy_config/config.yaml and fill in your secret values.
# This file is safe to commit — it contains no real secrets.

watchlist:
  - ticker: "NVDA"
    tier1_interval_h: 1
    tier2_time_utc: "22:00"
  - ticker: "TSLA"
    tier1_interval_h: 1
    tier2_time_utc: "22:00"
  - ticker: "AAPL"
    tier1_interval_h: 1
    tier2_time_utc: "22:00"

signal_thresholds:
  rsi_oversold: 30
  rsi_overbought: 70
  volume_ratio_moderate: 1.5   # info-only alert
  volume_ratio_strong: 2.0     # full pipeline launch
  atr_ratio: 1.5

cooldown:
  rsi_extreme_h: 12
  macd_cross_h: 24
  bollinger_breach_h: 6
  volume_anomaly_h: 4
  atr_spike_h: 6
  golden_cross_d: 7            # don't re-fire within a week

# LLM config for the position advisor — the lightweight synthesis step that
# combines TradingAgents reports + Schwab position → actionable Telegram advice.
# This is separate from TradingAgents' own LLM config (set that in TradingAgents).
#
# Supported providers:
#   gemini    — Google Gemini (cheapest for synthesis; api_key from aistudio.google.com)
#   deepseek  — DeepSeek (OpenAI-compatible; defaults to api.deepseek.com/v1)
#   openai    — OpenAI (defaults to api.openai.com/v1)
#   anthropic — Anthropic Claude (defaults to api.anthropic.com)
#
# Recommended setup: DeepSeek for TradingAgents (heavy), Gemini for advisor (light).
llm:
  provider: "gemini"              # gemini, deepseek, openai, or anthropic
  model: "gemini-2.5-flash"      # or gemini-2.5-pro, deepseek-chat, gpt-4o, claude-sonnet-4-6
  api_key: ""                     # your API key for this provider
  # api_base: ""                  # override default API endpoint (optional)

telegram:
  bot_token: ""                # from @BotFather
  chat_id: ""                  # your chat ID

# Schwab brokerage integration — enables position-aware advice.
# When enabled, Watchy fetches your current position before each notification
# and calls the LLM to synthesize: analysis + your position → specific advice
# (e.g. "you hold 50 shares at $98 cost, analysts are bullish, consider adding
# 10 more shares at current levels").
#
# Setup: https://developer.schwab.com/
# Python SDK: pip install schwabdev
schwab:
  enabled: false               # set to true to enable position-aware advice
  api_key: ""                  # Schwab app key
  api_secret: ""               # Schwab app secret
  account_id: ""               # Schwab account number (e.g. "12345678")

log_level: "INFO"
log_file: "~/watchy/watchy.log"
