# Watchy Secrets — sensitive credentials (DO NOT commit).
# Copy to ~/watchy_config/secrets.yaml and fill in your real values.

llm:
  provider: "gemini"              # gemini, deepseek, openai, or anthropic
  model: "gemini-3.5-flash"
  api_key: ""                     # Gemini API key (for position advisor)
  # api_base: ""                  # optional custom endpoint
  deepseek_api_key: ""            # DeepSeek API key (for TradingAgents analysis)
  # gemini_thinking_tier1: "off"  # advisor thinking level, Tier 1 (off/minimal/low/medium/high)
  # gemini_thinking_tier2: "low"  # advisor thinking level, Tier 2 (the daily read)

telegram:
  bot_token: ""                   # from @BotFather
  chat_id: ""                     # your Telegram chat ID

schwab:
  enabled: false                  # set to true for live position-aware advice
  api_key: ""                     # Schwab app key (developer.schwab.com)
  api_secret: ""                  # Schwab app secret
  account_id: ""                  # account number to use; blank = first linked account
  callback_url: "https://127.0.0.1"               # must match your Schwab app's callback
  tokens_path: "~/watchy_config/schwab_tokens.db"  # schwabdev 3.x SQLite token store
  # First run needs a one-time browser OAuth (paste the redirect URL in the terminal).
  # The refresh token lasts 7 days, then re-auth. If a live fetch ever fails, Watchy
  # falls back to the cached snapshot, then to ~/watchy_config/positions.yaml.
