# Watchy Configuration — non-sensitive settings (safe to commit).
# Sensitive credentials go in secrets.yaml (git-ignored).
#
# Deploy:
#   cp config.yaml ~/watchy_config/config.yaml
#   cp secrets.example.yaml ~/watchy_config/secrets.yaml
#   # then edit secrets.yaml with your real keys

watchlist:
  - "COHR"
  - "AMZN"
  - "GOOG"
  - "AVGO"
  - "NVDA"
  - "ANET"
  - "CARR"
  - "EMR"
  - "NVT"
  - "VST"
  - "ETN" 
  - "VRT"
  - "LRCX"
  - "LUMN"
  - "ASML"
  - "MOD"
  - "SKHY"

  # - "AAPL"
  # - "KLAC"
  # - "AMAT"
  # - "RMBS"
  # - "APH"
  # - "HUBB"
  # - "TSLA"
  # - "SOXX"
  # - "SMCI"
  # - "CEG"

  
  # Short form uses defaults: scan every 30min, daily at 10:30 UTC.
  # For per-ticker overrides, use the long form:
  # - ticker: "NVDA"
  #   tier1_interval_h: 2
  #   tier2_time_utc: "14:30"
  #   # Optional manual entry level (else the #16 auto-derived target is used).
  #   target_price: 180.0
  #   # Per-ticker override of the global Tier 2 gate (min_price_proximity_pct
  #   # below): e.g. set a huge percent to effectively never gate this name, or a
  #   # smaller one to gate it tighter than the default.
  #   min_price_proximity_pct: 8.0
  #   # Per-ticker ATR-adaptive band override (overrides the global mult below).
  #   atr_proximity_mult: 5.0

# Tier 2 price-proximity gate (#15) — global default applied to every watch-only
# (non-held) ticker. On weekdays, skip the daily LLM pipeline when price is farther
# than this percent from the entry target (manual target_price, else the #16
# auto-derived one). Held tickers and Sunday always run; Tier 1 is never gated.
# A per-ticker min_price_proximity_pct (long-form watchlist above) overrides this.
# Remove this line to disable the gate globally.
min_price_proximity_pct: 8.0

# Optional ATR-adaptive band (#15 follow-up). When set, the gate band becomes
# atr_proximity_mult x ATR% (ATR% = avg_atr_20d / price x 100) instead of the
# fixed percent above — i.e. "skip when price is more than `mult` typical trading
# days of movement from target". Volatile names get a wider band, calm names a
# narrower one. Clamped to [proximity_pct_floor, proximity_pct_ceiling]; falls
# back to the fixed percent when ATR data is unavailable. Leave commented to keep
# the fixed-percent behaviour. Calibrate the mult with
# scripts/calibrate_atr_proximity.py before enabling.
# Calibrated 2026-06-16 against the live watchlist: x3 skips ~9/21 (keeps cost
# savings) while no longer silencing volatile-but-near names (MOD, NVDA, ...).
atr_proximity_mult: 3.0
# proximity_pct_floor: 4.0
# proximity_pct_ceiling: 20.0

# Tier 1 intraday rescan cap (#23). Each Tier 1 signal trip launches a paid
# [market+social] pipeline + advisor, guarded only by per-signal cooldown — so a
# busy ticker tripping several distinct signals stacks several paid rescans in a
# day (observed: KLAC x4, LRCX x3). Cap the number of Tier 1 LLM pipelines per
# ticker per UTC day; further trips are logged + notified (Signal Fired (rescan
# capped)) but skip the pipeline. A per-ticker max_tier1_pipelines_per_day in the
# long-form watchlist overrides this. Remove this line to disable the cap.
# Tier 2 scheduled runs are never affected.
max_tier1_pipelines_per_day: 2

# Thresholds & cooldowns below are OPTIONAL — defaults are in code.
# Uncomment any section to override.

# signal_thresholds:
#   rsi_oversold: 30
#   rsi_overbought: 70
#   volume_ratio_strong: 2.0
#   atr_ratio: 1.5

# cooldown:
#   rsi_extreme_h: 12
#   macd_cross_h: 24
#   bollinger_breach_h: 6
#   volume_anomaly_h: 4
#   atr_spike_h: 6
#   golden_cross_d: 7

log_level: "DEBUG"
log_file: "~/watchy/watchy.log"
