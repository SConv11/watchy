# Watchy Configuration — non-sensitive settings (safe to commit).
# Sensitive credentials go in secrets.yaml (git-ignored).
#
# Deploy:
#   cp config.yaml ~/watchy_config/config.yaml
#   cp secrets.example.yaml ~/watchy_config/secrets.yaml
#   # then edit secrets.yaml with your real keys

watchlist:
  - "AMZN"
  - "CARR"
  - "EMR"
  - "GOOG"
  - "NVT"
  - "VST"
  - "AAPL"
  # - "TSLA"
  - "MOD"
  - "VRT"
  - "SMCI"
  - "CEG"
  - "AVGO"
  - "APH"
  - "HUBB"
  - "SOXX"
  - "PLTR"
  - "NVDA"
  # Short form uses defaults: scan every 30min, daily at 11:30 UTC.
  # For per-ticker overrides, use the long form:
  # - ticker: "NVDA"
  #   tier1_interval_h: 2
  #   tier2_time_utc: "14:30"
  #   # Optional: only run Tier 1 when price is within N% of a target level.
  #   # Both keys required to enable; omit them to scan regardless of price.
  #   target_price: 180.0
  #   tier1_min_price_proximity_pct: 5.0
  #   # Optional Tier 2 weekday gate (#15): skip the daily LLM pipeline when
  #   # price is farther than N% from the target (manual target_price above, or
  #   # the #16 auto-derived one). Sunday always runs. Omit to never gate.
  #   tier2_min_price_proximity_pct: 8.0

# Thresholds & cooldowns below are OPTIONAL — defaults are in code.
# Uncomment any section to override.

# signal_thresholds:
#   rsi_oversold: 30
#   rsi_overbought: 70
#   volume_ratio_moderate: 1.5
#   volume_ratio_strong: 2.0
#   atr_ratio: 1.5

# cooldown:
#   rsi_extreme_h: 12
#   macd_cross_h: 24
#   bollinger_breach_h: 6
#   volume_anomaly_h: 4
#   atr_spike_h: 6
#   golden_cross_d: 7

log_level: "DEBUG"
log_file: "~/watchy/watchy.log"
